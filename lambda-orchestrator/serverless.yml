# serverless.yml
service: lambda-orchestrator

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 29          # Máximo para API Gateway; el handler usa 8-10s por llamada
  environment:
    NODE_ENV:              ${opt:stage, 'dev'}
    CUSTOMERS_API_BASE:    ${env:CUSTOMERS_API_BASE}
    ORDERS_API_BASE:       ${env:ORDERS_API_BASE}
    SERVICE_TOKEN:         ${env:SERVICE_TOKEN}
    DB_HOST:               ${env:DB_HOST}
    DB_PORT:               ${env:DB_PORT, '3306'}
    DB_NAME:               ${env:DB_NAME}
    DB_USER:               ${env:DB_USER}
    DB_PASS:               ${env:DB_PASS}

functions:
  createAndConfirmOrder:
    handler: src/handler.handler
    events:
      - http:
          path:   orchestrator/create-and-confirm-order
          method: post
          cors:   true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
